name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS (build + test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Zero warnings are enforced by the compiler via -warnings-as-errors on the
      # project's targets (see Package.swift), so a warning fails `swift build`.
      - name: Build (debug)
        run: swift build

      # GitHub's macOS runners ship full Xcode, so XCTest is present and the
      # PaisleyCore suite runs here (unlike a local CLT-only toolchain).
      - name: Test
        run: swift test

      - name: Build (release)
        run: swift build -c release

  linux:
    name: Linux (build + test)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4

      # On Linux the manifest gates the SwiftUI app out (#if os(macOS)), so this
      # builds and tests PaisleyCore — the platform-agnostic engine — alone.
      # -warnings-as-errors (Package.swift) means a warning fails the build.
      - name: Build
        run: swift build

      - name: Test
        run: swift test

  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    container: ghcr.io/realm/swiftlint:latest
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        # Non-strict for now: reports violations as annotations and fails only on
        # error-severity rules. Tighten to `--strict` once the tree is clean.
        run: swiftlint lint --reporter github-actions-logging
